<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Amazon Warehouse Deals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">Amazon Warehouse Deals</h1>
    <form method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Suchbegriff">
            <button class="btn btn-primary" type="submit">Suchen</button>
        </div>
    </form>
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <ul class="list-group">
        {% for deal in deals %}
        <li class="list-group-item">
            <a href="{{ deal.link }}" target="_blank">{{ deal.title }}</a>
            {% if deal.price %}
            <span class="badge bg-success float-end">{{ deal.price }}</span>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
